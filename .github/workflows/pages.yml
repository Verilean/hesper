name: Pages site

# Builds + publishes https://verilean.github.io/hesper/ — the
# top-level landing page, the doc-gen4 API reference (`/api/`), the
# rendered tutorial chapters (`/tutorial/`), and snapshot pages for
# the benchmark JSONs (`/dev/{micro-bench,bitnet-bench}/`).
#
# Pages source must be set to "GitHub Actions" (workflow mode) in
# repo Settings → Pages.  The legacy "Deploy from branch (gh-pages)"
# mode is no longer used — benchmark results now flow through
# artifact upload from the Cross-Platform CI workflow instead of
# being committed to `gh-pages`.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy at a time, but cancel in-progress
# runs in favour of the newest push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site (tutorial + API reference)
    runs-on: ubuntu-22.04
    env:
      # Don't try to link CUDA into per-module dynlibs (this job has
      # no NVIDIA driver — same reasoning as `linux-vulkan` in ci.yml).
      HESPER_NO_CUDA: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install apt deps for Hesper native build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libvulkan-dev vulkan-tools mesa-vulkan-drivers \
            libx11-dev libx11-xcb-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev libxcb1-dev \
            libxkbcommon-dev libwayland-dev libgl1-mesa-dev \
            clang libc++-dev libc++abi-dev \
            python3 python3-pip

      - name: Setup Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false

      - name: Install jupyter nbconvert (for tutorial → HTML)
        run: |
          # `xlean-convert` produces the chapter `.ipynb`s; nbconvert
          # then renders each to a standalone HTML page.  We never
          # invoke the xeus-lean kernel here, so cells appear as
          # source + markdown without `#eval` output (Ch04 / Ch11
          # rich-output cells render as inert code blocks).
          python3 -m pip install --user --no-warn-script-location \
            jupyter-core nbconvert
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build xlean-convert from upstream xeus-lean
        run: |
          git clone --depth 1 https://github.com/Verilean/xeus-lean.git /tmp/xeus-lean
          cd /tmp/xeus-lean
          lake build xlean-convert
          echo "/tmp/xeus-lean/.lake/build/bin" >> $GITHUB_PATH

      - name: Generate .lean and .ipynb from Markdown
        run: bash docs/tutorial/build-from-md.sh

      # Build Hesper once so `doc-gen4` can resolve every module
      # referenced from `Hesper.lean`.  This pulls Dawn / the native
      # bridge as a side effect (same path as the linux-vulkan job)
      # — heavy, but cached at the dawn-build step on later runs.
      - name: Build Hesper (root module for doc-gen4)
        run: lake build Hesper

      - name: "Doc: build doc-gen4 API reference"
        run: |
          # `Hesper:docs` is the doc-gen4 target attached to the
          # root `lean_lib «Hesper»`.  It walks every module
          # reachable from `Hesper.lean` and writes the rendered
          # reference HTML into `.lake/build/doc/`.
          lake build Hesper:docs

      - name: "Doc: convert tutorial notebooks to HTML"
        run: |
          mkdir -p site/tutorial
          for nb in docs/tutorial/Notebooks/Gen/notebooks/*.ipynb; do
            base=$(basename "$nb" .ipynb)
            echo "=== rendering $nb → site/tutorial/${base}.html ==="
            jupyter nbconvert --to html --template classic \
              --output-dir site/tutorial \
              "$nb"
          done

      - name: "Doc: download micro-bench artifact (from ci.yml build)"
        uses: actions/download-artifact@v4
        with:
          name: bench-data-micro
          path: bench-data
        continue-on-error: true  # missing on first run is fine

      - name: "Doc: download BitNet bench artifact (from ci.yml build)"
        uses: actions/download-artifact@v4
        with:
          name: bench-data-bitnet
          path: bench-data
        continue-on-error: true

      - name: "Doc: assemble site (api + tutorial + bench + landing page)"
        run: |
          mkdir -p site/api
          # Copy the doc-gen4 output into site/api/.
          if [ -d .lake/build/doc ]; then
            cp -r .lake/build/doc/. site/api/
          fi

          # Per-benchmark dashboard pages.  benchmark-action's
          # `external-data-json-path` writes a JS file whose body is
          # `window.BENCHMARK_DATA = {...};` — we render the latest
          # entry per suite as a simple table.
          for pair in "micro-bench:micro-bench" "bitnet-bench:bitnet-bench"; do
            jsfile_name="${pair%%:*}"
            bench="${pair##*:}"
            jsfile="bench-data/${jsfile_name}.json"
            outdir="site/dev/${bench}"
            mkdir -p "${outdir}"
            if [ -f "${jsfile}" ]; then
              cp "${jsfile}" "${outdir}/data.js"
              python3 - "${jsfile}" "${outdir}/index.html" "${bench}" <<'PYEOF'
          import json, re, sys, html
          path, out, name = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path) as f:
              src = f.read()
          m = re.search(r'=\s*(\{.*\})\s*;?\s*$', src, re.S)
          data = json.loads(m.group(1) if m else src)
          entries = data.get('entries', {})
          rows = []
          for suite, runs in entries.items():
              if not runs:
                  continue
              latest = runs[-1]
              commit_sha = (latest.get('commit') or {}).get('id', '')[:7]
              for bm in latest.get('benches', []):
                  rows.append((suite, bm.get('name','?'), bm.get('value','?'), bm.get('unit',''), commit_sha))
          body = ['<!DOCTYPE html><html><head><meta charset="utf-8">',
                  f'<title>{html.escape(name)}</title>',
                  '<style>body{font-family:system-ui,sans-serif;max-width:880px;margin:40px auto;padding:0 16px;line-height:1.5}',
                  'table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:.4em .6em;text-align:left}',
                  'th{background:#f6f8fa}a{color:#0366d6;text-decoration:none}a:hover{text-decoration:underline}',
                  '.muted{color:#666;font-size:.9em}</style></head><body>',
                  f'<h1>{html.escape(name)}</h1>',
                  '<p class="muted">Latest-run snapshot. Raw history JSON: <a href="data.js">data.js</a>.</p>',
                  '<table><thead><tr><th>Suite</th><th>Benchmark</th><th>Value</th><th>Unit</th><th>Commit</th></tr></thead><tbody>']
          for s, n, v, u, c in rows:
              body.append(f'<tr><td>{html.escape(s)}</td><td>{html.escape(n)}</td><td>{v}</td><td>{html.escape(u)}</td><td><code>{html.escape(c)}</code></td></tr>')
          body += ['</tbody></table>',
                   '<p><a href="../../">← back to top</a></p></body></html>']
          with open(out, 'w') as f:
              f.write('\n'.join(body))
          PYEOF
            else
              cat > "${outdir}/index.html" <<EOF
          <!DOCTYPE html><html><head><meta charset="utf-8"><title>${bench}</title></head>
          <body><h1>${bench}</h1><p>No benchmark data uploaded yet on this run.</p>
          <p><a href="../../">← back to top</a></p></body></html>
          EOF
            fi
          done

          # Tutorial index page.
          {
            echo '<!DOCTYPE html>'
            echo '<html><head><meta charset="utf-8">'
            echo '<title>Hesper Tutorial</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;line-height:1.5}h1{margin-bottom:.4em}ul{padding-left:1.2em}a{color:#0366d6;text-decoration:none}a:hover{text-decoration:underline}</style>'
            echo '</head><body>'
            echo '<h1>Hesper Tutorial</h1>'
            echo '<p>HTML renderings of the chapter notebooks generated from <code>docs/tutorial/md/*.md</code> via <code>xlean-convert</code> + <code>jupyter nbconvert</code>. Source markdown is the authoritative form; these HTML pages are convenience.</p>'
            echo '<ul>'
            for html_file in site/tutorial/ch*.html site/tutorial/Ch*.html; do
              [ -e "$html_file" ] || continue
              name=$(basename "$html_file" .html)
              echo "  <li><a href=\"$(basename "$html_file")\">${name}</a></li>"
            done
            echo '</ul>'
            echo '<p><a href="../">← back to top</a></p>'
            echo '</body></html>'
          } > site/tutorial/index.html

          # Top-level landing page.
          {
            echo '<!DOCTYPE html>'
            echo '<html><head><meta charset="utf-8">'
            echo '<title>Hesper — Verified WebGPU Inference</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;line-height:1.55}h1{margin-bottom:.2em}h2{margin-top:1.5em}.lead{color:#555;font-size:1.1em;margin-top:0}a{color:#0366d6;text-decoration:none}a:hover{text-decoration:underline}ul{padding-left:1.2em}li{margin:.3em 0}code{background:#f4f4f4;padding:.1em .3em;border-radius:3px}</style>'
            echo '</head><body>'
            echo '<h1>Hesper</h1>'
            echo '<p class="lead">A formally verifiable WebGPU / WGSL / PTX inference engine in Lean 4. Type-safe DSL, multi-backend (Vulkan / Metal / CUDA), production-grade Gemma 4 + BitNet runtimes.</p>'
            echo '<h2>Documentation</h2>'
            echo '<ul>'
            echo '  <li><a href="tutorial/">Tutorial</a> — chapter-by-chapter walk-through of the Shader DSL, verified ops + AD, multi-backend dispatch, BitNet + Gemma 4 end-to-end, and the Ch11 California Housing data-analysis case study.</li>'
            echo '  <li><a href="api/">API reference</a> — generated from source by <code>doc-gen4</code>. Covers every module reachable from <code>Hesper.lean</code>.</li>'
            echo '</ul>'
            echo '<h2>Benchmarks</h2>'
            echo '<ul>'
            echo '  <li><a href="dev/micro-bench/">Hesper Kernel Micro-Benchmark</a></li>'
            echo '  <li><a href="dev/bitnet-bench/">BitNet b1.58 2B Inference (macOS Metal)</a></li>'
            echo '</ul>'
            echo '<h2>Source</h2>'
            echo '<p><a href="https://github.com/Verilean/hesper">github.com/Verilean/hesper</a></p>'
            echo '</body></html>'
          } > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
